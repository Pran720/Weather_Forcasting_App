<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Weather App</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container text-center mt-4">

  <!-- Title -->
  <h1>🌤 Weather Forecast</h1>
  <h4 id="time"></h4>

  <!-- Search -->
  <div class="searchBox mt-3">
    <input
      id="cityInput"
      class="form-control w-50 mx-auto"
      placeholder="Search City"
    />
    <div class="mt-3">
      <button onclick="searchCity()" class="btn btn-primary me-2">Search</button>
      <button onclick="darkMode()" class="btn btn-dark me-2">🌙 Dark</button>
      <button onclick="getMyLocation()" class="btn btn-success">
        📍 Use My Location
      </button>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader" class="loader mt-3"></div>

  <!-- Current Weather -->
  <div class="weatherCard mt-4 p-4">

    <h2 id="city">Loading...</h2>

    <div id="icon" class="weather-icon"></div>

    <h1 id="temp">--°C</h1>

    <p id="condition">--</p>

    <div class="d-flex justify-content-center gap-4">
      <p>💧 Humidity: <span id="humidity">--%</span></p>
      <p>🌬 Wind: <span id="wind">-- km/h</span></p>
    </div>

  </div>

  
  <!-- 7 Day Forecast -->
  <h3 class="mt-4">7 Day Forecast</h3>
  <div class="forecast d-flex justify-content-center gap-3 flex-wrap">

    <div class="card p-3">Mon<br>32° / 22°<br>☀️</div>
    <div class="card p-3">Tue<br>30° / 20°<br>☁️</div>
    <div class="card p-3">Wed<br>28° / 18°<br>🌧</div>
    <div class="card p-3">Thu<br>31° / 21°<br>☀️</div>
    <div class="card p-3">Fri<br>29° / 19°<br>☁️</div>
    <div class="card p-3">Sat<br>34° / 24°<br>☀️</div>
    <div class="card p-3">Sun<br>33° / 23°<br>⛅</div>
    

  </div>

  <!-- Map -->
  <h3 class="mt-4">Weather Map</h3>
  <iframe
    id="map"
    width="100%"
    height="300"
    style="border-radius:15px;border:0"
    loading="lazy"
    allowfullscreen>
  </iframe>

</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
